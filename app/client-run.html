<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correr planner — UCONVERT MARKETING</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #000;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-decoration: none;
    }
    .btn-back {
      color: #aaa;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    .btn-back:hover { color: #fff; }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Client pill ── */
    .client-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 40px;
      padding: 8px 16px 8px 8px;
      margin-bottom: 28px;
    }
    .client-pill img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: contain;
      background: #f5f5f5;
    }
    .pill-name { font-size: 14px; font-weight: 600; }
    .pill-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 36px;
    }

    /* ── Form ── */
    .form-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e8e8;
      overflow: hidden;
    }
    .form-section {
      padding: 28px 32px;
      border-bottom: 1px solid #f0f0f0;
    }
    .form-section:last-of-type { border-bottom: none; }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      margin-bottom: 20px;
    }
    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    label .required { color: #e03; margin-left: 2px; }
    label .hint {
      font-weight: 400;
      color: #999;
      font-size: 12px;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="month"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: #000; }
    textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── Step labels ── */
    .step-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      background: #000;
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .field-with-step label {
      display: flex;
      align-items: center;
    }

    /* ── Form footer ── */
    .form-footer {
      padding: 24px 32px;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-cancel {
      background: transparent;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: #aaa; }
    .btn-submit {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.82; }
    .btn-submit svg { flex-shrink: 0; }

    /* ── Coming soon ── */
    .coming-soon {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #f0f0f0;
      color: #888;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .page { padding: 28px 16px 60px; }
      .form-section { padding: 22px 20px; }
      .form-footer { padding: 18px 20px; flex-direction: column-reverse; }
      .btn-cancel, .btn-submit { width: 100%; justify-content: center; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html" class="header-brand">UCONVERT MARKETING</a>
  <a href="../index.html" class="btn-back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Volver
  </a>
</header>

<main class="page">

  <div class="client-pill" id="clientPill" style="display:none">
    <img id="clientLogo" src="" alt="" />
    <div class="pill-dot" id="clientDot"></div>
    <span class="pill-name" id="clientName"></span>
  </div>

  <h1 class="page-title">Inputs del mes</h1>
  <p class="page-subtitle">Completá los datos del mes para que Claude genere la agenda de contenido</p>

  <form class="form-card" id="runForm" onsubmit="handleSubmit(event)">

    <!-- Mes -->
    <div class="form-section">
      <div class="section-title">Período</div>
      <div class="field">
        <label>Mes objetivo <span class="required">*</span></label>
        <input type="month" name="month" required />
      </div>
    </div>

    <!-- Inputs del mes (PASO 1.5) -->
    <div class="form-section">
      <div class="section-title">Inputs del mes</div>

      <div class="field field-with-step">
        <label>
          <span class="step-label">A</span>
          Campaña del mes
          <span class="hint">— nombre y descripción breve</span>
        </label>
        <textarea name="campaign" placeholder="ej: Lanzamiento colección invierno. Campaña para posicionar los nuevos acolchados de bambú y destacar su suavidad para el frío."></textarea>
      </div>

      <div class="field field-with-step">
        <label>
          <span class="step-label">B</span>
          Producción de contenido
        </label>
        <div class="field-row" style="margin-top:8px">
          <div>
            <label style="font-weight:400;font-size:12px;color:#666;margin-bottom:4px">Nivel de producción</label>
            <select name="productionLevel">
              <option value="">— seleccionar —</option>
              <option value="low">Low production (fotos de producto, UGC)</option>
              <option value="high">High production (shooting, video)</option>
            </select>
          </div>
          <div>
            <label style="font-weight:400;font-size:12px;color:#666;margin-bottom:4px">Formato principal</label>
            <select name="productionFormat">
              <option value="">— seleccionar —</option>
              <option value="photo">Foto</option>
              <option value="video">Video</option>
              <option value="mixed">Mixto (foto + video)</option>
            </select>
          </div>
        </div>
        <textarea name="productionNotes" placeholder="Notas adicionales (opcional)…" style="margin-top:10px;min-height:54px"></textarea>
      </div>

      <div class="field field-with-step">
        <label>
          <span class="step-label">C</span>
          Ofertas o descuentos
          <span class="hint">— dejar vacío si no hay</span>
        </label>
        <input type="text" name="offers" placeholder="ej: 20% de descuento en sábanas 1800 hilos hasta el 15 del mes" />
      </div>

      <div class="field field-with-step">
        <label>
          <span class="step-label">D</span>
          Referencias (refes)
          <span class="hint">— links de Instagram o YouTube para inspiración</span>
        </label>
        <textarea name="references" placeholder="https://www.instagram.com/p/...&#10;https://www.youtube.com/watch?v=...&#10;(uno por línea)"></textarea>
      </div>
    </div>

    <div class="form-footer">
      <a href="../index.html" class="btn-cancel">Cancelar</a>
      <button type="submit" class="btn-submit">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2l8 4.5L3 11V2z" fill="#fff"/>
        </svg>
        Generar agenda
        <span class="coming-soon">próximamente</span>
      </button>
    </div>

  </form>
</main>

<script>
  // Cargar datos del cliente desde la URL
  async function loadClient() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return;

    try {
      const res = await fetch('../clients.json');
      const clients = await res.json();
      const client = clients.find(c => c.id === id);
      if (!client) return;

      // Pill
      const pill = document.getElementById('clientPill');
      const logo = client.logo || '';
      document.getElementById('clientLogo').src = logo.startsWith('http') ? logo : '../' + logo;
      document.getElementById('clientDot').style.background = client.primaryColor;
      document.getElementById('clientName').textContent = client.name;
      pill.style.display = 'inline-flex';

      // Prefill mes actual
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 2).padStart(2, '0'); // próximo mes
      document.querySelector('[name=month]').value = `${yyyy}-${mm}`;

      // Guardar id en form
      document.getElementById('runForm').dataset.clientId = id;

    } catch(e) { console.error(e); }
  }

  function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const data = Object.fromEntries(new FormData(form).entries());
    data.clientId = form.dataset.clientId;

    // En producción: disparar GitHub Actions workflow_dispatch
    // Por ahora mostrar el payload
    alert(
      'Payload listo para enviar a GitHub Actions:\n\n' +
      JSON.stringify(data, null, 2) +
      '\n\n⚙️ La integración con GitHub Actions estará disponible en la próxima versión.'
    );
  }

  loadClient();
</script>

</body>
</html>
